<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Çengel Bulmaca</title>
    <link rel="stylesheet" href="./css/app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase yapılandırması: ./js/firebase-config.js dosyasını oluşturup
         window.CB_FIREBASE_CONFIG = {...} tanımlayabilirsiniz. -->
    <script src="./js/firebase-config.js" onerror="console.info('firebase-config.js bulunamadı; yerel mod.')"></script>
</head>
<body>
<div class="grain"></div>
<div class="wrap">

<header>
    <div class="logo">
        <div class="logo-mark">Ç</div>
        <span>Çengel Bulmaca</span>
    </div>
    <div class="hdr-r" style="display: flex; align-items: center; gap: 8px;">
        <button class="sb-btn" id="open-scoreboard" title="Puan Tablosu">🏆 Skor</button>
        <button class="auth-btn" id="auth-btn" title="Giriş">Giriş</button>
        <button class="theme-btn" id="theme-toggle" title="Gece/Gündüz Modu">🌙</button>
    </div>
</header>
<div id="progress-strip" class="progress-strip" style="display:none;">
    <div class="ps-text"><span id="global-progress-text"></span></div>
    <div class="ps-track"><div class="ps-fill" id="ps-fill"></div></div>
</div>

<section class="hero">
    <p class="hero-over">TÜRKÇE KELİME OYUNU</p>
    <h1>Kelimeleri <em>bul</em>,<br>süreyi <em>yen</em>.</h1>
    <p class="hero-sub">Hızlı çöz, yüksek puan kazan. Her saniye sayıyor.</p>
    <div class="hero-line"></div>
</section>

<nav class="tabs">
    <button class="tab on" data-d="Kolay">
        <span class="tab-dot diff-kolay"></span>Kolay
    </button>
    <button class="tab" data-d="Orta">
        <span class="tab-dot diff-orta"></span>Orta
    </button>
    <button class="tab" data-d="Zor">
        <span class="tab-dot diff-zor"></span>Zor
    </button>
    <button class="tab" data-d="Çok Zor">
        <span class="tab-dot diff-cok-zor"></span>Çok Zor
    </button>
</nav>

<div id="levels-container"></div>

<section class="info">
    <div class="info-card" style="--i:0">
        <div class="info-icon">⚡</div>
        <div><b>Süre Bonusu</b><p>60 saniye altında bitir, +200 bonus</p></div>
    </div>
    <div class="info-card" style="--i:1">
        <div class="info-icon">💡</div>
        <div><b>İpucu</b><p>Her ipucu kullanımı -15 puan</p></div>
    </div>
    <div class="info-card" style="--i:2">
        <div class="info-icon">🎯</div>
        <div><b>Zorluk Çarpanı</b><p>Kolay ×1 · Orta ×1.5 · Zor ×2 · Çok Zor ×3</p></div>
    </div>
</section>

<footer>
    <div class="footer-line"></div>
    <p>Çengel Bulmaca © 2026</p>
</footer>

</div>

<script>
    // TEMA KONTROLCÜSÜ
const themeToggle = document.getElementById('theme-toggle');
const currentTheme = localStorage.getItem('theme');

if (currentTheme === 'dark') {
    document.body.classList.add('dark-mode');
    if(themeToggle) themeToggle.textContent = '☀️';
}

if(themeToggle) {
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
}
// PYTHON DÖNGÜLERİ YERİNE JAVASCRIPT KART OLUŞTURUCU
const levelsContainer = document.getElementById('levels-container');
const difficulties = ['Kolay', 'Orta', 'Zor', 'Çok Zor'];

difficulties.forEach((diff, index) => {
    const section = document.createElement('section');
    section.className = `sec ${diff !== 'Kolay' ? 'hide' : ''}`;
    section.dataset.d = diff;

    const grid = document.createElement('div');
    grid.className = 'grid-list';

    // Her zorluk için 25 bölüm (Toplam 100)
    const start = index * 25 + 1;
    const end = (index + 1) * 25;

    for (let i = start; i <= end; i++) {
        // LİNK DÜZELTİLDİ: /bulmaca/1 yerine play.html?id=1
        grid.innerHTML += `
        <a href="play.html?id=${i}" class="card" id="c${i}" style="--i:${i - start}">
            <div class="card-inner">
                <div class="card-num">#${i.toString().padStart(3, '0')}</div>
                <div class="card-title">Bölüm ${i}</div>
                <div class="card-meta">
                    <span class="card-words">Oyna</span>
                    <span class="card-score" id="s${i}"></span>
                </div>
            </div>
            <div class="card-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
        </a>`;
    }
    section.appendChild(grid);
    levelsContainer.appendChild(section);
});

// TAB SİSTEMİ VE ANİMASYONLAR
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    document.querySelectorAll('.sec').forEach(s=>{
        const show = s.dataset.d === t.dataset.d;
        s.classList.toggle('hide', !show);
        if(show) s.querySelectorAll('.card').forEach((c,i)=>{
            c.style.animation='none';c.offsetHeight;
            c.style.animation=`cardIn .4s ease ${i*30}ms both`;
        });
    });
}});

// LOCALSTORAGE PUAN KONTROLÜ
// LOCALSTORAGE PUAN KONTROLÜ VE GENEL İLERLEME
try{
    const s=JSON.parse(localStorage.getItem('cb')||'{}');
    let completedCount = 0; // GÜNCELLEME: Sayaç eklendi
    
    Object.entries(s).forEach(([id,d])=>{
        const e=document.getElementById('s'+id);
        if(e){
            e.textContent='✓ '+d.s+'p';
            e.classList.add('has');
            completedCount++; // Tamamlananları say
        }
        const c=document.getElementById('c'+id);if(c)c.classList.add('done');
    });

    // İlerleme şeridi
    if(completedCount > 0) {
        const strip = document.getElementById('progress-strip');
        const text = document.getElementById('global-progress-text');
        const fill = document.getElementById('ps-fill');
        const pct = (completedCount / 100) * 100;
        text.innerHTML = `<b>${completedCount}</b>/100 tamamlandı · <span style="color:var(--green)">%${pct|0}</span>`;
        fill.style.width = pct + '%';
        strip.style.display = 'block';
    }
}catch(e){}
</script>

<script src="./js/auth.js"></script>
<script src="./js/scoreboard.js"></script>
<script>
// AUTH BUTONU + SCOREBOARD
const authBtn = document.getElementById('auth-btn');
const sbBtn = document.getElementById('open-scoreboard');

function refreshAuthBtn(user) {
    if(user) {
        const initial = (user.name || '?')[0].toUpperCase();
        const avatar = user.photoURL
            ? `<img src="${user.photoURL}" alt="">`
            : `<span class="auth-btn-icon">${initial}</span>`;
        authBtn.innerHTML = avatar + '<span>' + (user.name || 'Kullanıcı').split(' ')[0] + '</span>';
        authBtn.title = user.name;
    } else {
        authBtn.innerHTML = 'Giriş';
    }
}

if(window.CBAuth) {
    window.CBAuth.onAuthChange(refreshAuthBtn);
}

authBtn.addEventListener('click', async () => {
    const user = window.CBAuth && window.CBAuth.getUser();
    if(user) {
        window.CBScoreboard.open();
    } else {
        if(window.CBAuth) await window.CBAuth.signIn();
    }
});

sbBtn.addEventListener('click', () => window.CBScoreboard.open());
</script>
</body>
</html>
