<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Çengel Bulmaca Oyna</title>
<link rel="stylesheet" href="./css/app.css"> <link rel="stylesheet" href="./css/play.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="./js/firebase-config.js" onerror="console.info('firebase-config.js yok; yerel mod.')"></script>
</head>
<body>
<div class="grain"></div>
<div class="wrap play-wrap">

<header class="play-hdr">
    <a href="index.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="play-title">
        <h1>Bölüm <span class="ui-puzzle-id">...</span></h1>
        <span class="play-diff" id="ui-puzzle-diff">Yükleniyor</span>
    </div>
    <div class="play-actions">
        <button class="icon-btn" id="sound-toggle" title="Ses">🔊</button>
        <button class="theme-btn" id="theme-toggle" title="Tema">🌙</button>
    </div>
    <div class="play-stats">
        <div class="ps">
            <span class="ps-v" id="tm">00:00</span>
            <span class="ps-l">SÜRE</span>
        </div>
        <div class="ps-sep"></div>
        <div class="ps">
            <span class="ps-v ps-hint" id="hc">0</span>
            <span class="ps-l">İPUCU</span>
        </div>
    </div>
</header>

<div class="clue-strip" id="cbar">
    <span class="clue-num" id="badge">—</span>
    <span class="clue-t" id="ctext">Bir hücreye dokunarak başla</span>
</div>

<main class="play-main">
    <div class="grid-col">
        <div class="grid-frame">
            <div class="grid-scroll">
                <div class="grid" id="grid"></div>
            </div>
        </div>
        <div class="toolbar">
            <button class="tool t-hint" onclick="doHint()"><span>💡</span> İpucu</button>
            <button class="tool t-check" onclick="doCheck()"><span>✓</span> Kontrol</button>
            <button class="tool t-dir" onclick="doDir()" id="dbtn">→ Yatay</button>
        </div>
    </div>

    <div class="clue-col">
        <div class="clue-section">
            <div class="clue-head ch-across">→ YATAY</div>
            <div id="cla" class="clue-list"></div>
        </div>
        <div class="clue-section">
            <div class="clue-head ch-down">↓ DİKEY</div>
            <div id="cld" class="clue-list"></div>
        </div>
    </div>
</main>

<div class="keyboard" id="kb">
    <div class="kb-r">
        <button class="key" data-k="Q">Q</button><button class="key" data-k="W">W</button><button class="key" data-k="E">E</button><button class="key" data-k="R">R</button><button class="key" data-k="T">T</button><button class="key" data-k="Y">Y</button><button class="key" data-k="U">U</button><button class="key" data-k="I">I</button><button class="key" data-k="O">O</button><button class="key" data-k="P">P</button><button class="key" data-k="Ğ">Ğ</button><button class="key" data-k="Ü">Ü</button>
    </div>
    <div class="kb-r">
        <button class="key" data-k="A">A</button><button class="key" data-k="S">S</button><button class="key" data-k="D">D</button><button class="key" data-k="F">F</button><button class="key" data-k="G">G</button><button class="key" data-k="H">H</button><button class="key" data-k="J">J</button><button class="key" data-k="K">K</button><button class="key" data-k="L">L</button><button class="key" data-k="Ş">Ş</button><button class="key" data-k="İ">İ</button>
    </div>
    <div class="kb-r">
        <button class="key" data-k="Z">Z</button><button class="key" data-k="X">X</button><button class="key" data-k="C">C</button><button class="key" data-k="V">V</button><button class="key" data-k="B">B</button><button class="key" data-k="N">N</button><button class="key" data-k="M">M</button><button class="key" data-k="Ö">Ö</button><button class="key" data-k="Ç">Ç</button><button class="key key-bs" data-k="BS">⌫</button>
    </div>
</div>

<div class="progress-bar">
    <div class="prog-info">
        <span>İlerleme</span>
        <span id="ptxt">0 / 0</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-btn" id="btn-prev" style="display:none;">← Önceki</a>
    <a href="#" class="nav-btn" id="btn-next" style="display:none;">Sonraki →</a>
</div>

<div class="overlay" id="modal" style="display:none">
    <div class="modal">
        <div class="confetti" id="confetti"></div>
        <div class="modal-top">
            <div class="modal-check">✓</div>
            <h2>Tebrikler!</h2>
            <p>Bölüm <span class="ui-puzzle-id"></span> tamamlandı</p>
        </div>
        <div class="modal-scores">
            <div class="ms"><span class="ms-v" id="fs">0</span><span class="ms-l">Puan</span></div>
            <div class="ms"><span class="ms-v" id="ft">00:00</span><span class="ms-l">Süre</span></div>
            <div class="ms"><span class="ms-v" id="fh">0</span><span class="ms-l">İpucu</span></div>
        </div>
        <div class="modal-detail" id="mbd"></div>
        <div class="modal-actions">
            <a href="#" class="mbtn mbtn-primary" id="modal-btn-next" style="display:none;">Sonraki Bölüm →</a>
            <button type="button" class="mbtn mbtn-ghost" onclick="window.CBScoreboard && window.CBScoreboard.open()">🏆 Skor</button>
            <a href="index.html" class="mbtn mbtn-ghost">Ana Sayfa</a>
        </div>
    </div>
</div>

</div>

<script>
    // TEMA KONTROLCÜSÜ
    const themeToggle = document.getElementById('theme-toggle');
    const THEMES = ['light', 'dark', 'ocean', 'sunset'];
    const THEME_ICONS = { light: '🌞', dark: '🌙', ocean: '🌊', sunset: '🌇' };
    const currentTheme = localStorage.getItem('theme') || 'light';

    function applyTheme(t) {
        document.body.classList.remove('dark-mode', 'theme-ocean', 'theme-sunset');
        document.body.dataset.theme = t;
        if(t === 'dark') document.body.classList.add('dark-mode');
        if(t === 'ocean') document.body.classList.add('theme-ocean');
        if(t === 'sunset') document.body.classList.add('theme-sunset');
        if(themeToggle) themeToggle.textContent = THEME_ICONS[t] || '🎨';
        localStorage.setItem('theme', t);
    }

    applyTheme(currentTheme);
    
    if(themeToggle) {
        themeToggle.addEventListener('click', () => {
            const cur = document.body.dataset.theme || 'light';
            const idx = THEMES.indexOf(cur);
            const next = THEMES[(idx + 1) % THEMES.length];
            applyTheme(next);
        });
    }

    // SES TOGGLE
    const soundBtn = document.getElementById('sound-toggle');
    const _settings = () => { try { return JSON.parse(localStorage.getItem('cb_settings') || '{}'); } catch(e) { return {}; } };
    const _saveSettings = (s) => localStorage.setItem('cb_settings', JSON.stringify(s));
    const curSettings = _settings();
    if(curSettings.sound === false) soundBtn.textContent = '🔇';
    soundBtn.addEventListener('click', () => {
        const s = _settings();
        s.sound = s.sound === false ? true : false;
        _saveSettings(s);
        soundBtn.textContent = s.sound === false ? '🔇' : '🔊';
    });
    // 1. URL'den hangi bölümde olduğumuzu anla (Örn: play.html?id=5)
    const urlParams = new URLSearchParams(window.location.search);
    const levelId = parseInt(urlParams.get('id')) || 1;
    const totalLevels = 750; // Toplam bulmaca sayın
    const dailyKey = urlParams.get('daily') || null;
    window.CB_DAILY_KEY = dailyKey; // play.js bunu kontrol eder

    // Kayıt/giriş zorunlu
    function redirectToLogin() {
        const next = encodeURIComponent(window.location.pathname + window.location.search);
        window.location.href = `login.html?next=${next}`;
    }

    // Auth + Welcome + Scoreboard yükle (önce)
    const authScript = document.createElement('script');
    authScript.src = './js/auth.js';
    document.body.appendChild(authScript);

    const welScript = document.createElement('script');
    welScript.src = './js/welcome.js';
    document.body.appendChild(welScript);

    const sbScript = document.createElement('script');
    sbScript.src = './js/scoreboard.js';
    document.body.appendChild(sbScript);

    function ensureAuthAndLoad() {
        if(!window.CBAuth || !window.CBAuth.isLoggedIn || !window.CBAuth.isLoggedIn()) {
            redirectToLogin();
            return;
        }
        loadPuzzle();
    }

    function loadPuzzle() {
    // Dosya adını bul (Örn: 5 ise "puzzle_005.json" olur)
    // Eğer senin json isimlerin puzzle_1.json gibiyse burayı şu şekilde değiştir: `puzzle_${levelId}.json`
    const fileName = `puzzle_${levelId.toString().padStart(3, '0')}.json`;
    // 2. Veriyi çek
    fetch(`./data/${fileName}`)
        .then(response => {
            if (!response.ok) throw new Error("JSON bulunamadı");
            return response.json();
        })
        .then(data => {
            // 3. play.js'nin beklediği global değişkenleri tanımla
            window.P = data;
            window.PID = levelId;
            
            // 4. HTML'deki dinamik yazıları güncelle
            const titlePrefix = dailyKey ? '✨ Günün' : 'Bölüm';
            document.title = `${titlePrefix} ${levelId} — Çengel Bulmaca`;
            document.querySelectorAll('.ui-puzzle-id').forEach(el => el.textContent = dailyKey ? '✨' : levelId);
            if(dailyKey) {
                const h1 = document.querySelector('.play-title h1');
                if(h1) h1.innerHTML = 'Günün Bulmacası';
            }
            document.getElementById('ptxt').textContent = `0 / ${data.words.length}`;
            
            const diffEl = document.getElementById('ui-puzzle-diff');
            if(data.difficulty) {
                const emoji = {'Kolay':'🌱','Orta':'🔥','Zor':'⚡','Çok Zor':'💎'}[data.difficulty] || '';
                diffEl.textContent = emoji + ' ' + data.difficulty;
                diffEl.className = `play-diff diff-${data.difficulty.toLowerCase().replace(' ', '-')}`;
            }

            // 5. İleri/Geri butonlarının linklerini ayarla (günlük modda gizle)
            const prevBtn = document.getElementById('btn-prev');
            const nextBtn = document.getElementById('btn-next');
            const modalNextBtn = document.getElementById('modal-btn-next');

            if (!dailyKey && levelId > 1) {
                prevBtn.href = `play.html?id=${levelId - 1}`;
                prevBtn.style.display = 'inline-flex';
            }
            if (!dailyKey && levelId < totalLevels) {
                nextBtn.href = `play.html?id=${levelId + 1}`;
                nextBtn.style.display = 'inline-flex';
                modalNextBtn.href = `play.html?id=${levelId + 1}`;
                modalNextBtn.style.display = 'inline-flex';
            }

            // 6. JSON başarıyla çekildikten sonra oyun motorunu (play.js) sayfanın içine yükle
            const script = document.createElement('script');
            script.src = './js/play.js';
            document.body.appendChild(script);
        })
        .catch(error => {
            console.error("Bulmaca yükleme hatası:", error);
            document.getElementById('grid').innerHTML = `<p style="padding: 2rem; text-align: center; color: red;">Bulmaca yüklenemedi. Lütfen URL'yi kontrol edin.</p>`;
        });
    }

    setTimeout(ensureAuthAndLoad, 150);
</script>
</body>
</html>
